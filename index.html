<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Ironworker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:transparent;font-family:Inter,Segoe UI,sans-serif;}
#launcher{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#0070c0,#1a8fe0);box-shadow:0 4px 20px rgba(0,112,192,0.5);cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;z-index:99998;}
#badge{position:fixed;bottom:76px;right:22px;background:#c0392b;color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 7px;z-index:99999;display:none;}
#window{position:fixed;bottom:96px;right:24px;width:360px;height:520px;background:#0d1b2a;border-radius:18px;border:1px solid #1e3a5f;box-shadow:0 20px 60px rgba(0,0,0,0.6);display:none;flex-direction:column;overflow:hidden;z-index:99997;}
#window.open{display:flex;}
#hdr{padding:14px 18px;background:linear-gradient(135deg,#0070c0,#1a8fe0);display:flex;align-items:center;gap:10px;}
#av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
#ht{flex:1;}
#ht strong{display:block;color:#fff;font-size:14px;}
#ht span{color:rgba(255,255,255,0.75);font-size:11px;}
#cls{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.8);font-size:20px;line-height:1;padding:0;}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:#1e4d7b;border-radius:3px;}
.msg{display:flex;align-items:flex-end;gap:6px;}
.msg.u{justify-content:flex-end;}
.mav{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#0070c0,#1a8fe0);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#fff;}
.bub{max-width:78%;padding:10px 13px;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.msg.b .bub{background:#112233;color:#dde8f0;border:1px solid #1e3a5f;border-radius:14px 14px 14px 3px;}
.msg.u .bub{background:linear-gradient(135deg,#0070c0,#1a8fe0);color:#fff;border-radius:14px 14px 3px 14px;}
.dots{display:flex;gap:5px;align-items:center;padding:10px 13px;}
.dot{width:7px;height:7px;border-radius:50%;background:#0070c0;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
#inp-area{padding:12px;border-top:1px solid #1e3a5f;display:flex;gap:8px;align-items:flex-end;}
#inp{flex:1;background:#112233;border:1px solid #1e4d7b;border-radius:10px;padding:9px 12px;color:#e0eaf5;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:38px;max-height:100px;overflow-y:auto;line-height:1.4;}
#inp:focus{border-color:#0070c0;}
#inp::placeholder{color:#3a5a7a;}
#snd{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#0070c0,#1a8fe0);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#snd:disabled{opacity:0.4;cursor:not-allowed;}
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:8px;}
#empty .ico{font-size:32px;opacity:0.5;}
#empty p{font-size:13px;color:#2a5070;margin:0;}
@media(max-width:400px){#window{width:calc(100vw - 16px);right:8px;bottom:80px;}}
</style>
</head>
<body>
<button id="launcher" title="Virtual Ironworker" onclick="tog()">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
    <path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
<div id="badge">1</div>
<div id="window">
  <div id="hdr">
    <div id="av">⚒️</div>
    <div id="ht">
      <strong>Virtual Ironworker</strong>
      <span>JR &amp; B Ironworks · Metal Fabrication Expert</span>
    </div>
    <button id="cls" onclick="tog()">✕</button>
  </div>
  <div id="msgs">
    <div id="empty">
      <div class="ico">⚙️</div>
      <p><strong style="color:#3a7aaa">How can I help you?</strong></p>
      <p>Gates, railings, handrails, welding, quotes...</p>
    </div>
  </div>
  <div id="inp-area">
    <textarea id="inp" placeholder="Type your question..." rows="1" onkeydown="onkey(event)"></textarea>
    <button id="snd" onclick="send()" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>
<script>
var SYS='You are the Virtual Ironworker for JR & B Ironworks Inc., a custom metal fabrication and installation company based in San Diego, CA. Expert in ornamental gates, railings, handrails, guardrails, steel structures, welding, and metal finishes. Help clients with technical questions and project estimates. Professional yet friendly tone. Always respond in English.';
var hist=[],isOpen=false;
function tog(){isOpen=!isOpen;document.getElementById('window').classList.toggle('open',isOpen);if(isOpen){document.getElementById('badge').style.display='none';document.getElementById('inp').focus();}}
function onkey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
document.getElementById('inp').addEventListener('input',function(){document.getElementById('snd').disabled=!this.value.trim();});
async function send(){var inp=document.getElementById('inp');var txt=inp.value.trim();if(!txt)return;var em=document.getElementById('empty');if(em)em.remove();inp.value='';document.getElementById('snd').disabled=true;hist.push({role:'user',content:txt});addMsg('u',txt);var tid='t'+Date.now();var tel=document.createElement('div');tel.className='msg b';tel.id=tid;tel.innerHTML='<div class="mav">⚒️</div><div class="bub dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';document.getElementById('msgs').appendChild(tel);scrl();try{var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:SYS,messages:hist})});var d=await r.json();var rep=d.content&&d.content[0]?d.content[0].text:'Could not get a response.';hist.push({role:'assistant',content:rep});document.getElementById(tid).remove();addMsg('b',rep);}catch(e){document.getElementById(tid).remove();addMsg('b','Connection error. Please try again.');}}
function addMsg(role,txt){var m=document.getElementById('msgs');var el=document.createElement('div');el.className='msg '+role;var safe=txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');if(role==='b'){el.innerHTML='<div class="mav">⚒️</div><div class="bub">'+safe+'</div>';}else{el.innerHTML='<div class="bub">'+safe+'</div>';}m.appendChild(el);scrl();}
function scrl(){var m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
setTimeout(function(){if(!isOpen)document.getElementById('badge').style.display='block';},3000);
</script>
</body>
</html>
