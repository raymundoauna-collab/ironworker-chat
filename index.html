<div id="hv-launcher" onclick="hvToggle()" style="position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#0070c0,#1a8fe0);box-shadow:0 4px 20px rgba(0,112,192,0.5);cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;z-index:99998;">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
    <path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>

<div id="hv-badge" style="position:fixed;bottom:76px;right:22px;background:#c0392b;color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 7px;z-index:99999;display:none;font-family:sans-serif;">1</div>

<div id="hv-window" style="position:fixed;bottom:96px;right:24px;width:360px;height:520px;background:#0d1b2a;border-radius:18px;border:1px solid #1e3a5f;box-shadow:0 20px 60px rgba(0,0,0,0.6);display:none;flex-direction:column;overflow:hidden;z-index:99997;font-family:Inter,Segoe UI,sans-serif;">

  <div style="padding:14px 18px;background:linear-gradient(135deg,#0070c0,#1a8fe0);display:flex;align-items:center;gap:10px;">
    <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">⚒️</div>
    <div style="flex:1;">
      <strong style="display:block;color:#fff;font-size:14px;">Virtual Ironworker</strong>
      <span style="color:rgba(255,255,255,0.75);font-size:11px;">JR &amp; B Ironworks · Metal Fabrication Expert</span>
    </div>
    <div onclick="hvToggle()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.8);font-size:20px;line-height:1;padding:0;">✕</div>
  </div>

  <div id="hv-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;">
    <div id="hv-empty" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:8px;">
      <div style="font-size:32px;opacity:0.5;">⚙️</div>
      <p style="font-size:14px;color:#3a7aaa;font-weight:700;margin:0;">How can I help you?</p>
      <p style="font-size:13px;color:#2a5070;margin:0;">Gates, railings, handrails, welding, quotes...</p>
    </div>
  </div>

  <div style="padding:12px;border-top:1px solid #1e3a5f;display:flex;gap:8px;align-items:flex-end;">
    <textarea id="hv-input" placeholder="Type your question..." rows="1" onkeydown="hvKey(event)" style="flex:1;background:#112233;border:1px solid #1e4d7b;border-radius:10px;padding:9px 12px;color:#e0eaf5;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:38px;max-height:100px;overflow-y:auto;line-height:1.4;"></textarea>
    <div id="hv-send" onclick="hvSend()" style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#0070c0,#1a8fe0);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
</div>

<script>
(function(){
  var SYSTEM='You are the Virtual Ironworker for JR & B Ironworks Inc., a custom metal fabrication and installation company based in San Diego, CA. Expert in ornamental gates, railings, handrails, guardrails, steel structures, welding, and metal finishes. Help clients with technical questions and project estimates. Professional yet friendly tone. Always respond in English.';
  var history=[];
  var open=false;

  window.hvToggle=function(){
    open=!open;
    var w=document.getElementById('hv-window');
    w.style.display=open?'flex':'none';
    if(open){
      document.getElementById('hv-badge').style.display='none';
      document.getElementById('hv-input').focus();
    }
  };

  window.hvKey=function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();hvSend();}
  };

  window.hvSend=async function(){
    var inp=document.getElementById('hv-input');
    var text=inp.value.trim();
    if(!text)return;
    var empty=document.getElementById('hv-empty');
    if(empty)empty.remove();
    inp.value='';
    history.push({role:'user',content:text});
    addMsg('user',text);
    var tid='hv-t'+Date.now();
    var tel=document.createElement('div');
    tel.id=tid;
    tel.style.cssText='display:flex;align-items:flex-end;gap:6px;';
    tel.innerHTML='<div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#0070c0,#1a8fe0);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#fff;">⚒️</div><div style="background:#112233;border:1px solid #1e3a5f;border-radius:14px 14px 14px 3px;padding:10px 13px;display:flex;gap:5px;align-items:center;"><span style="width:7px;height:7px;border-radius:50%;background:#0070c0;display:inline-block;animation:hvb 1.2s infinite;"></span><span style="width:7px;height:7px;border-radius:50%;background:#0070c0;display:inline-block;animation:hvb 1.2s infinite 0.2s;"></span><span style="width:7px;height:7px;border-radius:50%;background:#0070c0;display:inline-block;animation:hvb 1.2s infinite 0.4s;"></span></div>';
    document.getElementById('hv-messages').appendChild(tel);
    scroll();
    try{
      var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:SYSTEM,messages:history})});
      var data=await res.json();
      var reply=data.content&&data.content[0]&&data.content[0].text?data.content[0].text:'Could not get a response.';
      history.push({role:'assistant',content:reply});
      document.getElementById(tid).remove();
      addMsg('bot',reply);
    }catch(e){
      document.getElementById(tid).remove();
      addMsg('bot','Connection error. Please try again.');
    }
  };

  function addMsg(role,text){
    var msgs=document.getElementById('hv-messages');
    var el=document.createElement('div');
    el.style.cssText='display:flex;align-items:flex-end;gap:6px;'+(role==='user'?'justify-content:flex-end;':'');
    var safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(role==='bot'){
      el.innerHTML='<div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#0070c0,#1a8fe0);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:#fff;">⚒️</div><div style="max-width:78%;padding:10px 13px;font-size:13px;line-height:1.5;background:#112233;color:#dde8f0;border:1px solid #1e3a5f;border-radius:14px 14px 14px 3px;white-space:pre-wrap;word-break:break-word;">'+safe+'</div>';
    }else{
      el.innerHTML='<div style="max-width:78%;padding:10px 13px;font-size:13px;line-height:1.5;background:linear-gradient(135deg,#0070c0,#1a8fe0);color:#fff;border-radius:14px 14px 3px 14px;white-space:pre-wrap;word-break:break-word;">'+safe+'</div>';
    }
    msgs.appendChild(el);
    scroll();
  }

  function scroll(){
    var m=document.getElementById('hv-messages');
    m.scrollTop=m.scrollHeight;
  }

  setTimeout(function(){
    if(!open)document.getElementById('hv-badge').style.display='block';
  },3000);

  var s=document.createElement('style');
  s.textContent='@keyframes hvb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}';
  document.head.appendChild(s);
})();
</script>
